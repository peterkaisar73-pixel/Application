<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صخرة العهد - المحاضرات والواجبات</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="theme-color" content="#F3EEE1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="wrap">

    <div class="header">
      <div class="logos-container">
        <img src="church-logo.jpeg" alt="الكنيسة الرسولية إمبابة" class="brand-logo">
        <img src="build your house.jpeg" alt="إبني بيتك" class="brand-logo">
      </div>

      <div class="eyebrow">مرحباً بكم في منصة</div>
      <h1>صخرة العهد</h1>
      <p class="sub" id="welcomeSub">أسرة: بيتر ومريم</p>
      <div class="divider">
        <span></span><div class="line"></div>
        <span></span><div class="line"></div>
        <span></span>
      </div>
    </div>

    <!-- Top Bar -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="font-size: 18px; margin: 0; color: var(--ink);">المحاضرات والواجبات</h2>
      <button onclick="doLogout()" style="background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 14px; border-radius: 20px; font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer;">تسجيل الخروج</button>
    </div>

    <!-- Lectures List -->
    <div id="lecturesContainer">
      <div style="text-align: center; color: var(--stone); padding: 20px;">جاري تحميل المحاضرات...</div>
    </div>

    <div class="footer-note">
      منصة رفع المحاضرات ومتابعة الواجبات · صخرة العهد
    </div>

  </div>

  <script src="config.js"></script>

  <script>
    async function initFamily() {
      try {
        // 1. تجربة جلب الحساب
        if (typeof getCurrentProfile === 'function') {
          const prof = await getCurrentProfile();
          if (prof && prof.name) {
            document.getElementById('welcomeSub').textContent = `أسرة: ${prof.name}`;
          }
        }
      } catch(e) { console.log(e); }

      fetchLectures();
    }

    async function fetchLectures() {
      const container = document.getElementById('lecturesContainer');
      
      try {
        // تحديد العميل بدون أخطاء
        const client = (typeof _supabase !== 'undefined') ? _supabase : supabase;

        const { data: lectures, error } = await client
          .from('lectures')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (!lectures || lectures.length === 0) {
          container.innerHTML = '<div class="lecture-card" style="text-align: center; color: var(--stone);">لا توجد محاضرات مضافة بعد.</div>';
          return;
        }

        container.innerHTML = lectures.map(lec => `
          <div class="lecture-card">
            <div class="lecture-header">
              <h3 class="lecture-title">${lec.title || lec.name || 'محاضرة'}</h3>
              <span class="lecture-date">${lec.created_at ? new Date(lec.created_at).toLocaleDateString('ar-EG') : ''}</span>
            </div>
            ${lec.description ? `<p class="lecture-desc">${lec.description}</p>` : ''}
            
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;">
              ${lec.file_url ? `
                <a href="${lec.file_url}" target="_blank" style="text-decoration: none; flex: 1;">
                  <button class="submit-btn" style="background: var(--deep); padding: 8px 15px; font-size: 13px; margin: 0;">📥 تحميل المحاضرة</button>
                </a>
              ` : ''}
              
              ${lec.assignment_url ? `
                <a href="${lec.assignment_url}" target="_blank" style="text-decoration: none; flex: 1;">
                  <button class="submit-btn" style="background: var(--accent); padding: 8px 15px; font-size: 13px; margin: 0;">📝 رابط الواجب</button>
                </a>
              ` : ''}
            </div>
          </div>
        `).join('');

      } catch (err) {
        console.error(err);
        container.innerHTML = '<div class="msg msg-error">حدث خطأ أثناء تحميل المحاضرات. برجاء إعادة المحاولة.</div>';
      }
    }

    async function doLogout() {
      try {
        if (typeof signOut === 'function') await signOut();
        else if (typeof _supabase !== 'undefined') await _supabase.auth.signOut();
      } catch(e) {}
      window.location.href = 'index.html';
    }

    window.onload = initFamily;
  </script>
</body>
</html>
