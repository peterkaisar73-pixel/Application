<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الأسرة - صخرة العهد</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="theme-color" content="#F3EEE1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- مكتبة Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="wrap">

    <div class="header">
      <!-- شعارات الكنيسة وإبني بيتك -->
      <div class="logos-container">
        <img src="church-logo.jpeg" alt="الكنيسة الرسولية إمبابة" class="brand-logo">
        <img src="build your house.jpeg" alt="إبني بيتك" class="brand-logo">
      </div>

      <div class="eyebrow">مرحبًا بكم في منصة</div>
      <h1>صخرة العهد</h1>
      <p class="sub" id="welcomeMsg">أسرة: بيتر ومريم</p>
      <div class="divider">
        <span></span><div class="line"></div>
        <span></span><div class="line"></div>
        <span></span>
      </div>
    </div>

    <!-- زر تسجيل الخروج والعنوان -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="font-size: 20px; font-weight: 700; margin: 0; color: var(--ink);">المحاضرات والواجبات</h2>
      <button onclick="handleLogout()" style="background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 6px 16px; border-radius: 50px; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer;">تسجيل الخروج</button>
    </div>

    <div id="msgBox"></div>

    <!-- قائمة المحاضرات -->
    <div id="lecturesList">
      <div style="text-align: center; color: var(--ink-soft); padding: 30px;">جاري تحميل المحاضرات...</div>
    </div>

    <div class="footer-note">منصة رفع المحاضرات ومتابعة الواجبات · صخرة العهد</div>

  </div>

  <script src="config.js"></script>

  <script>
    async function loadFamilyData() {
      const container = document.getElementById('lecturesList');

      try {
        // التأكد من تسجيل الدخول
        let profile = null;
        if (typeof getCurrentProfile === 'function') {
          profile = await getCurrentProfile();
        }

        if (profile && profile.name) {
          document.getElementById('welcomeMsg').textContent = `أسرة: ${profile.name}`;
        }

        // جلب المحاضرات من قاعدة البيانات
        const client = typeof _supabase !== 'undefined' ? _supabase : (typeof supabase !== 'undefined' ? supabase : null);
        
        if (!client) {
          throw new Error("لم يتم العثور على الاتصال بقاعدة البيانات");
        }

        const { data: lectures, error } = await client
          .from('lectures')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (!lectures || lectures.length === 0) {
          container.innerHTML = '<div class="auth-card" style="text-align: center; color: var(--ink-soft);">لا توجد محاضرات متاحة حاليًا.</div>';
          return;
        }

        // عرض المحاضرات بتصميم الكروت المخصص
        container.innerHTML = lectures.map(lecture => `
          <div class="auth-card" style="margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px dashed var(--stone-line); padding-bottom: 8px;">
              <h3 style="margin: 0; font-size: 18px; color: var(--ink); font-weight: 700;">${lecture.title || lecture.name || 'محاضرة بدون عنوان'}</h3>
              <span style="font-size: 12px; color: var(--ink-soft);">${lecture.created_at ? new Date(lecture.created_at).toLocaleDateString('ar-EG') : ''}</span>
            </div>
            
            ${lecture.description ? `<p style="font-size: 14px; color: var(--ink-soft); margin-bottom: 15px; line-height: 1.6;">${lecture.description}</p>` : ''}

            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
              ${(lecture.file_url || lecture.pdf_url) ? `
                <a href="${lecture.file_url || lecture.pdf_url}" target="_blank" style="text-decoration: none; flex: 1; min-width: 140px;">
                  <button class="submit-btn" style="background: var(--deep); padding: 9px 12px; font-size: 13px; margin: 0;">📥 تحميل المحاضرة</button>
                </a>
              ` : ''}

              ${(lecture.assignment_url || lecture.quiz_url) ? `
                <a href="${lecture.assignment_url || lecture.quiz_url}" target="_blank" style="text-decoration: none; flex: 1; min-width: 140px;">
                  <button class="submit-btn" style="background: var(--accent); padding: 9px 12px; font-size: 13px; margin: 0;">📝 رابط الواجب</button>
                </a>
              ` : ''}
            </div>
          </div>
        `).join('');

      } catch (err) {
        console.error("Error loading lectures:", err);
        container.innerHTML = '<div class="msg msg-error">تعذر تحميل المحاضرات، يرجى المحاولة لاحقًا.</div>';
      }
    }

    async function handleLogout() {
      if (typeof signOut === 'function') {
        await signOut();
      }
      window.location.href = 'index.html';
    }

    // بدء التحميل عند فتح الصفحة
    document.addEventListener('DOMContentLoaded', loadFamilyData);
  </script>
</body>
</html>
