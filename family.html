<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الأسرة - صخرة العهد</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="theme-color" content="#F3EEE1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="wrap">

    <div class="header">
      <!-- لوجوهات الكنيسة وإبني بيتك -->
      <div class="logos-container">
        <img src="church-logo.jpeg" alt="الكنيسة الرسولية إمبابة" class="brand-logo">
        <img src="build your house.jpeg" alt="إبني بيتك" class="brand-logo">
      </div>

      <div class="eyebrow">مرحبًا بكم في منصة</div>
      <h1>صخرة العهد</h1>
      <p class="sub" id="welcomeMsg">جاري التحميل...</p>
      <div class="divider">
        <span></span><div class="line"></div>
        <span></span><div class="line"></div>
        <span></span>
      </div>
    </div>

    <!-- أزرار الإجراءات العليا -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="font-size: 20px; font-weight: 700; margin: 0; color: var(--ink);">المحاضرات والواجبات</h2>
      <button onclick="logout()" style="background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 6px 16px; border-radius: 50px; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer;">تسجيل الخروج</button>
    </div>

    <div id="msgBox"></div>

    <!-- قائمة المحاضرات بالتنسيق الأصلي -->
    <div id="lecturesList">
      <div style="text-align: center; color: var(--stone); padding: 30px;">جاري تحميل المحاضرات...</div>
    </div>

    <div class="footer-note">منصة رفع المحاضرات ومتابعة الواجبات · صخرة العهد</div>

  </div>

  <script src="config.js"></script>

  <script>
    let currentProfile = null;

    async function init() {
      currentProfile = await getCurrentProfile();
      if (!currentProfile) {
        window.location.href = 'index.html';
        return;
      }

      document.getElementById('welcomeMsg').textContent = `أسرة: ${currentProfile.name || 'مرحبًا بك'}`;
      loadLectures();
    }

    async function loadLectures() {
      const container = document.getElementById('lecturesList');
      
      const { data: lectures, error } = await supabase
        .from('lectures')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        container.innerHTML = '<div class="msg msg-error">حدث خطأ أثناء تحميل المحاضرات</div>';
        return;
      }

      if (!lectures || lectures.length === 0) {
        container.innerHTML = '<div class="auth-card" style="text-align: center; color: var(--ink-soft);">لا توجد محاضرات متاحة حاليًا.</div>';
        return;
      }

      // عرض المحاضرات بالتنسيق الأصلي المنظم
      container.innerHTML = lectures.map(lecture => `
        <div class="lecture-card">
          <div class="lecture-header">
            <h3 class="lecture-title">${lecture.title}</h3>
            <span class="lecture-date">${new Date(lecture.created_at).toLocaleDateString('ar-EG')}</span>
          </div>
          ${lecture.description ? `<p class="lecture-desc">${lecture.description}</p>` : ''}
          
          <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;">
            ${lecture.file_url ? `
              <a href="${lecture.file_url}" target="_blank" style="text-decoration: none; flex: 1;">
                <button class="submit-btn" style="background: var(--deep); padding: 8px 15px; font-size: 13px;">📥 تحميل المحاضرة</button>
              </a>
            ` : ''}
            
            ${lecture.assignment_url ? `
              <a href="${lecture.assignment_url}" target="_blank" style="text-decoration: none; flex: 1;">
                <button class="submit-btn" style="background: var(--gold); color: #fff; padding: 8px 15px; font-size: 13px;">📝 رابط الواجب</button>
              </a>
            ` : ''}
          </div>
        </div>
      `).join('');
    }

    async function logout() {
      await signOut();
      window.location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
