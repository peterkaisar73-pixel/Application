<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صخرة العهد - المحاضرات والواجبات</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="theme-color" content="#F3EEE1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="wrap">

    <div class="header">
      <!-- اللوجوهات المضافة فقط -->
      <div class="logos-container">
        <img src="church-logo.jpeg" alt="الكنيسة الرسولية إمبابة" class="brand-logo">
        <img src="build your house.jpeg" alt="إبني بيتك" class="brand-logo">
      </div>

      <div class="eyebrow">مرحباً بكم في منصة</div>
      <h1>صخرة العهد</h1>
      <p class="sub" id="welcomeSub">جاري التحميل...</p>
      <div class="divider">
        <span></span><div class="line"></div>
        <span></span><div class="line"></div>
        <span></span>
      </div>
    </div>

    <!-- Top Bar / User Info -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="font-size: 18px; margin: 0; color: var(--ink);">المحاضرات والواجبات</h2>
      <button onclick="doLogout()" style="background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 12px; border-radius: 20px; font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer;">تسجيل الخروج</button>
    </div>

    <div id="msgBox"></div>

    <!-- Lectures List -->
    <div id="lecturesContainer">
      <div style="text-align: center; color: var(--stone); padding: 20px;">جاري تحميل المحاضرات...</div>
    </div>

    <div class="footer-note">
      منصة رفع المحاضرات ومتابعة الواجبات · صخرة العهد
    </div>

  </div>

  <script src="config.js"></script>

  <script>
    let currentFamily = null;

    async function initFamily() {
      currentFamily = await getCurrentProfile();
      
      if (!currentFamily) {
        window.location.href = 'index.html';
        return;
      }

      if (currentFamily.is_admin) {
        window.location.href = 'admin.html';
        return;
      }

      document.getElementById('welcomeSub').textContent = `أسرة: ${currentFamily.name || 'مرحباً بك'}`;

      fetchLectures();
    }

    async function fetchLectures() {
      const container = document.getElementById('lecturesContainer');
      
      const { data: lectures, error } = await _supabase
        .from('lectures')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error(error);
        container.innerHTML = '<div class="msg msg-error">حدث خطأ أثناء تحميل المحاضرات</div>';
        return;
      }

      if (!lectures || lectures.length === 0) {
        container.innerHTML = '<div class="auth-card" style="text-align: center; color: var(--stone);">لا توجد محاضرات مضافة بعد.</div>';
        return;
      }

      container.innerHTML = lectures.map(lec => {
        return `
          <div class="lecture-card">
            <div class="lecture-header">
              <h3 class="lecture-title">${lec.title}</h3>
              <span class="lecture-date">${new Date(lec.created_at).toLocaleDateString('ar-EG')}</span>
            </div>
            ${lec.description ? `<p class="lecture-desc">${lec.description}</p>` : ''}
            
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;">
              ${lec.file_url ? `
                <a href="${lec.file_url}" target="_blank" style="text-decoration: none; flex: 1;">
                  <button class="submit-btn" style="background: var(--deep); padding: 8px 15px; font-size: 13px; margin: 0;">📥 تحميل المحاضرة</button>
                </a>
              ` : ''}
              
              ${lec.assignment_url ? `
                <a href="${lec.assignment_url}" target="_blank" style="text-decoration: none; flex: 1;">
                  <button class="submit-btn" style="background: var(--accent); padding: 8px 15px; font-size: 13px; margin: 0;">📝 رابط الواجب</button>
                </a>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    async function doLogout() {
      await signOut();
      window.location.href = 'index.html';
    }

    initFamily();
  </script>
</body>
</html>
