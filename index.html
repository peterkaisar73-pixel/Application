<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صخرة العهد</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="page-wrap" style="max-width:440px; padding-top:60px;">

  <div class="brand" style="margin-bottom:28px;">
    <svg class="brand-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 3 L42 15 L36 44 L12 44 L6 15 Z" fill="#1c2e40" stroke="#c9a54d" stroke-width="1.6"/>
      <path d="M24 3 L42 15 L36 44 L12 44 L6 15 Z" fill="none" stroke="#c9a54d" stroke-width="0.6" transform="scale(0.82) translate(5,5)"/>
      <path d="M24 15 L24 33 M17 22 L31 22" stroke="#e3c980" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div>
      <h1 class="brand-title">صخرة العهد</h1>
      <div class="brand-sub">فَنَزَلَ الْمَطَرُ... وَلَمْ يَسْقُطْ، لأَنَّهُ كَانَ مُؤَسَّسًا عَلَى الصَّخْرِ</div>
    </div>
  </div>

  <div class="tablet" style="padding:30px 26px;">

    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="login">تسجيل الدخول</div>
      <div class="tab" data-tab="signup">حساب جديد</div>
    </div>

    <div id="msgBox"></div>

    <!-- ==== تسجيل الدخول ==== -->
    <form id="loginForm">
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="loginEmail" required autocomplete="email">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="loginPassword" required autocomplete="current-password">
      </div>
      <button class="btn" type="submit" style="width:100%;" id="loginBtn">دخول</button>
    </form>

    <!-- ==== حساب جديد ==== -->
    <form id="signupForm" class="hidden">
      <div class="field">
        <label>اسم الأسرة</label>
        <input type="text" id="suName" required placeholder="مثال: أسرة مار مرقس">
      </div>
      <div class="field">
        <label>رقم الموبايل</label>
        <input type="tel" id="suPhone" required placeholder="01xxxxxxxxx">
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="suEmail" required autocomplete="email">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="suPassword" required minlength="6" autocomplete="new-password">
      </div>
      <button class="btn" type="submit" style="width:100%;" id="signupBtn">إنشاء الحساب</button>
    </form>

  </div>

  <p style="text-align:center; color:var(--cream-dim); font-size:13px; margin-top:22px;">
    منصة رفع المحاضرات ومتابعة الواجبات
  </p>
</div>

<script src="config.js"></script>
<script>
  // التبديل بين تسجيل الدخول وإنشاء حساب
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.tab;
      document.getElementById('loginForm').classList.toggle('hidden', target !== 'login');
      document.getElementById('signupForm').classList.toggle('hidden', target !== 'signup');
      document.getElementById('msgBox').innerHTML = '';
    });
  });

  function showMsg(text, type = 'error') {
    document.getElementById('msgBox').innerHTML =
      `<div class="msg msg-${type}">${text}</div>`;
  }

  // لو المستخدم مسجل دخول بالفعل، وجّهه مباشرة
  (async () => {
    const profile = await getCurrentProfile();
    if (profile) {
      window.location.href = profile.is_admin ? 'admin.html' : 'family.html';
    }
  })();

  // تسجيل الدخول
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    const { error } = await signIn(email, password);

    if (error) {
      showMsg('البريد الإلكتروني أو كلمة المرور غير صحيحة');
      btn.disabled = false;
      btn.textContent = 'دخول';
      return;
    }

    const profile = await getCurrentProfile();
    window.location.href = profile?.is_admin ? 'admin.html' : 'family.html';
  });

  // إنشاء حساب جديد
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('signupBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    const name = document.getElementById('suName').value.trim();
    const phone = document.getElementById('suPhone').value.trim();
    const email = document.getElementById('suEmail').value.trim();
    const password = document.getElementById('suPassword').value;

    const { error } = await signUpFamily(email, password, name, phone);

    if (error) {
      showMsg(error.message === 'User already registered'
        ? 'البريد الإلكتروني مسجل بالفعل، جرّب تسجيل الدخول'
        : 'حصل خطأ: ' + error.message);
      btn.disabled = false;
      btn.textContent = 'إنشاء الحساب';
      return;
    }

    showMsg('تم إنشاء الحساب بنجاح، جاري تحويلك...', 'success');
    setTimeout(() => window.location.href = 'family.html', 1000);
  });
</script>
</body>
</html>
