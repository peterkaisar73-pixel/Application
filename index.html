<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صخرة العهد</title>
  
  <!-- PWA & Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="theme-color" content="#131f2c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="صخرة العهد">

  <!-- Fonts & Styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="header">
    <div class="eyebrow">منصة المحاضرات</div>
    <h1>صخرة العهد</h1>
    <p class="sub">فَنَزَلَ الْمَطَرُ... وَلَمْ يَسْقُطْ، لأَنَّهُ كَانَ مُؤَسَّسًا عَلَى الصَّخْرِ</p>
    <div class="divider">
      <span></span><div class="line"></div>
      <span></span><div class="line"></div>
      <span></span>
    </div>
  </div>

  <div class="wrap">

    <!-- تبويب التنقل -->
    <div class="tabs-row" id="tabs">
      <button type="button" class="tab-btn active" data-tab="login">تسجيل الدخول</button>
      <button type="button" class="tab-btn" data-tab="signup">حساب جديد</button>
    </div>

    <!-- كارت النماذج -->
    <div class="auth-card">

      <!-- صندوق الرسائل والأخطاء -->
      <div id="msgBox"></div>

      <!-- ==== نموذج تسجيل الدخول ==== -->
      <form id="loginForm" class="form-panel active">
        <div class="field">
          <label for="loginEmail">البريد الإلكتروني</label>
          <input type="email" id="loginEmail" required autocomplete="email" placeholder="example@domain.com">
        </div>
        <div class="field">
          <label for="loginPassword">كلمة المرور</label>
          <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button class="submit-btn" type="submit" id="loginBtn">دخول المنصة</button>
      </form>

      <!-- ==== نموذج حساب جديد ==== -->
      <form id="signupForm" class="form-panel hidden">
        <div class="field">
          <label for="suName">اسم الأسرة</label>
          <input type="text" id="suName" required placeholder="مثال: أسرة مار مرقس">
        </div>
        <div class="field">
          <label for="suPhone">رقم الموبايل</label>
          <input type="tel" id="suPhone" required placeholder="01xxxxxxxxx">
        </div>
        <div class="field">
          <label for="suEmail">البريد الإلكتروني</label>
          <input type="email" id="suEmail" required autocomplete="email" placeholder="example@domain.com">
        </div>
        <div class="field">
          <label for="suPassword">كلمة المرور</label>
          <input type="password" id="suPassword" required minlength="6" autocomplete="new-password" placeholder="6 أرقام أو حروف على الأقل">
        </div>
        <button class="submit-btn" type="submit" id="signupBtn">إنشاء الحساب</button>
      </form>

    </div>

    <div class="footer-note">منصة رفع المحاضرات ومتابعة الواجبات · صخرة العهد</div>

  </div>

  <!-- السكريبتات الأساسية المربوطة بـ Supabase -->
  <script src="config.js"></script>

  <script>
    // تسجيل الـ Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    // التبديل بين تسجيل الدخول وإنشاء حساب
    document.querySelectorAll('.tabs-row .tab-btn').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tabs-row .tab-btn').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const target = tab.dataset.tab;
        
        document.getElementById('loginForm').classList.toggle('hidden', target !== 'login');
        document.getElementById('signupForm').classList.toggle('hidden', target !== 'signup');
        
        document.getElementById('loginForm').classList.toggle('active', target === 'login');
        document.getElementById('signupForm').classList.toggle('active', target === 'signup');

        document.getElementById('msgBox').innerHTML = '';
      });
    });

    function showMsg(text, type = 'error') {
      document.getElementById('msgBox').innerHTML =
        `<div class="msg msg-${type}">${text}</div>`;
    }

    // لو المستخدم مسجل دخول بالفعل، وجّهه مباشرة
    (async () => {
      const profile = await getCurrentProfile();
      if (profile) {
        window.location.href = profile.is_admin ? 'admin.html' : 'family.html';
      }
    })();

    // عملية تسجيل الدخول عبر Supabase
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> جاري الدخول...';

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      const { error } = await signIn(email, password);

      if (error) {
        showMsg('البريد الإلكتروني أو كلمة المرور غير صحيحة');
        btn.disabled = false;
        btn.textContent = 'دخول المنصة';
        return;
      }

      const profile = await getCurrentProfile();
      window.location.href = profile?.is_admin ? 'admin.html' : 'family.html';
    });

    // عملية إنشاء حساب جديد عبر Supabase
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> جاري التسجيل...';

      const name = document.getElementById('suName').value.trim();
      const phone = document.getElementById('suPhone').value.trim();
      const email = document.getElementById('suEmail').value.trim();
      const password = document.getElementById('suPassword').value;

      const { error } = await signUpFamily(email, password, name, phone);

      if (error) {
        showMsg(error.message === 'User already registered'
          ? 'البريد الإلكتروني مسجل بالفعل، جرّب تسجيل الدخول'
          : 'حصل خطأ: ' + error.message);
        btn.disabled = false;
        btn.textContent = 'إنشاء الحساب';
        return;
      }

      showMsg('تم إنشاء الحساب بنجاح، جاري تحويلك...', 'success');
      setTimeout(() => window.location.href = 'family.html', 1000);
    });
  </script>
</body>
</html>
