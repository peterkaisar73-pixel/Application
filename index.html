<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صخرة العهد</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="theme-color" content="#F3EEE1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="wrap">

    <div class="header">
      <!-- شعارات الخدمة والكنيسة -->
      <div class="logos-container">
        <img src="church-logo.jpeg" alt="الكنيسة الرسولية إمبابة" class="brand-logo">
        <img src="build your house.jpeg" alt="إبني بيتك" class="brand-logo">
      </div>

      <div class="eyebrow">منصة المحاضرات</div>
      <h1>صخرة العهد</h1>
      <p class="sub">فَنَزَلَ الْمَطَرُ... وَلَمْ يَسْقُطْ، لأَنَّهُ كَانَ مُؤَسَّسًا عَلَى الصَّخْرِ</p>
      <div class="divider">
        <span></span><div class="line"></div>
        <span></span><div class="line"></div>
        <span></span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs-row">
      <button type="button" class="tab-btn active" id="tab-login-btn" onclick="switchTab('login')">تسجيل الدخول</button>
      <button type="button" class="tab-btn" id="tab-signup-btn" onclick="switchTab('signup')">حساب جديد</button>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">

      <div id="msgBox"></div>

      <!-- Login Form -->
      <form id="loginForm" class="form-panel active">
        <div class="field">
          <label for="loginEmail">البريد الإلكتروني</label>
          <input type="email" id="loginEmail" required placeholder="example@domain.com">
        </div>
        <div class="field">
          <label for="loginPassword">كلمة المرور</label>
          <input type="password" id="loginPassword" required placeholder="••••••••">
        </div>
        <button class="submit-btn" type="submit" id="loginBtn">دخول المنصة</button>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="form-panel">
        <div class="field">
          <label for="suName">اسم الأسرة</label>
          <input type="text" id="suName" required placeholder="مثال: أسرة مار مرقس">
        </div>
        <div class="field">
          <label for="suPhone">رقم الموبايل</label>
          <input type="tel" id="suPhone" required placeholder="01xxxxxxxxx">
        </div>
        <div class="field">
          <label for="suEmail">البريد الإلكتروني</label>
          <input type="email" id="suEmail" required placeholder="example@domain.com">
        </div>
        <div class="field">
          <label for="suPassword">كلمة المرور</label>
          <input type="password" id="suPassword" required minlength="6" placeholder="6 أرقام أو حروف على الأقل">
        </div>
        <button class="submit-btn" type="submit" id="signupBtn">إنشاء الحساب</button>
      </form>

    </div>

    <div class="footer-note">منصة رفع المحاضرات ومتابعة الواجبات · صخرة العهد</div>

  </div>

  <script src="config.js"></script>

  <script>
    function switchTab(target) {
      const loginBtn = document.getElementById('tab-login-btn');
      const signupBtn = document.getElementById('tab-signup-btn');
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');

      document.getElementById('msgBox').innerHTML = '';

      if (target === 'login') {
        loginBtn.classList.add('active');
        signupBtn.classList.remove('active');
        loginForm.classList.add('active');
        signupForm.classList.remove('active');
      } else {
        signupBtn.classList.add('active');
        loginBtn.classList.remove('active');
        signupForm.classList.add('active');
        loginForm.classList.remove('active');
      }
    }

    function showMsg(text, type = 'error') {
      document.getElementById('msgBox').innerHTML = `<div class="msg msg-${type}">${text}</div>`;
    }

    (async () => {
      const profile = await getCurrentProfile();
      if (profile) {
        window.location.href = profile.is_admin ? 'admin.html' : 'family.html';
      }
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'جاري الدخول...';

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      const { error } = await signIn(email, password);

      if (error) {
        showMsg('البريد الإلكتروني أو كلمة المرور غير صحيحة');
        btn.disabled = false;
        btn.textContent = 'دخول المنصة';
        return;
      }

      const profile = await getCurrentProfile();
      window.location.href = profile?.is_admin ? 'admin.html' : 'family.html';
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.textContent = 'جاري التسجيل...';

      const name = document.getElementById('suName').value.trim();
      const phone = document.getElementById('suPhone').value.trim();
      const email = document.getElementById('suEmail').value.trim();
      const password = document.getElementById('suPassword').value;

      const { error } = await signUpFamily(email, password, name, phone);

      if (error) {
        showMsg(error.message === 'User already registered'
          ? 'البريد الإلكتروني مسجل بالفعل، جرّب تسجيل الدخول'
          : 'حصل خطأ: ' + error.message);
        btn.disabled = false;
        btn.textContent = 'إنشاء الحساب';
        return;
      }

      showMsg('تم إنشاء الحساب بنجاح، جاري تحويلك...', 'success');
      setTimeout(() => window.location.href = 'family.html', 1000);
    });
  </script>
</body>
</html>
