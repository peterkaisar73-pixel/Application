<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صخرة العهد - منصة المحاضرات</title>
  
  <!-- PWA Links -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="header">
    <div class="eyebrow">منصة الكورس</div>
    <h1>صخرة العهد</h1>
    <p class="sub">فَنَزَلَ الْمَطَرُ... وَلَمْ يَسْقُطْ، لأَنَّهُ كَانَ مُؤَسَّسًا عَلَى الصَّخْرِ</p>
    <div class="divider">
      <span></span><div class="line"></div>
      <span></span><div class="line"></div>
      <span></span>
    </div>
  </div>

  <div class="wrap">
    
    <!-- زرار التنقل بين التسجيل وإنشاء الحساب -->
    <div class="tabs-row">
      <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="tab-btn" onclick="switchTab('register')">حساب جديد</button>
    </div>

    <!-- كارت النماذج -->
    <div class="auth-card">
      
      <!-- نموذج تسجيل الدخول -->
      <form id="loginForm" class="form-panel active">
        <div class="field">
          <label for="loginPhone">رقم التليفون</label>
          <input type="tel" id="loginPhone" placeholder="01xxxxxxxxx" required>
        </div>
        <div class="field">
          <label for="loginPassword">كلمة السر</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="submit-btn">دخول المنصة</button>
      </form>

      <!-- نموذج حساب جديد -->
      <form id="registerForm" class="form-panel">
        <div class="field">
          <label for="regName">الاسم بالكامل</label>
          <input type="text" id="regName" placeholder="اكتب اسمك هنا" required>
        </div>
        <div class="field">
          <label for="regPhone">رقم التليفون</label>
          <input type="tel" id="regPhone" placeholder="01xxxxxxxxx" required>
        </div>
        <div class="field">
          <label for="regPassword">كلمة السر</label>
          <input type="password" id="regPassword" placeholder="أنشئ كلمة سر" required>
        </div>
        <button type="submit" class="submit-btn">إنشاء حساب جديد</button>
      </form>

    </div>

    <div class="footer-note">منصة رفع المحاضرات ومتابعة الواجبات · صخرة العهد</div>

  </div>

  <script>
    function switchTab(tab) {
      const btns = document.querySelectorAll('.tab-btn');
      const forms = document.querySelectorAll('.form-panel');

      btns.forEach(btn => btn.classList.remove('active'));
      forms.forEach(form => form.classList.remove('active'));

      if (tab === 'login') {
        btns[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        btns[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
    }

    // تسجيل الـ Service Worker لتطبيق الـ PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
